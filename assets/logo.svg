<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <!-- Flowing connecting arcs (the "knowledge circle") -->
  <g fill="none" stroke="#E95420" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.5">
    <path d="M 58 28 C 75 28 85 45 82 62" />
    <path d="M 72 74 C 50 90 30 85 18 72" />
    <path d="M 22 62 C 15 45 30 28 48 28" />
  </g>

  <!-- Three knowledge circles (Quick, Reference, Knowledge) -->
  <g fill="#E95420">
    <circle cx="50" cy="25" r="11" />
    <circle cx="22" cy="70" r="11" />
    <circle cx="78" cy="70" r="11" />
  </g>

  <!-- Interior symbols (white, visible at larger sizes) -->
  <g fill="none" stroke="#FFFFFF" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
    <!-- Quick: lightning bolt -->
    <path d="M 48 20 L 45 27 H 52 L 49 33" />
    <!-- Reference: document lines -->
    <path d="M 19 67 L 19 75 L 25 75 M 19 69 H 24 M 19 72 H 24" />
    <!-- Knowledge: diamond/star -->
    <path d="M 78 63 L 82 70 L 78 77 L 74 70 Z" />
  </g>
</svg>
